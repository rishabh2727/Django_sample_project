<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Search</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .filters { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        input, select { padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 16px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .tags-container { display: flex; gap: 8px; flex-wrap: wrap; }
        .tag-checkbox { display: flex; align-items: center; gap: 4px; }
        .product-card { border: 1px solid #ddd; border-radius: 6px; padding: 16px; margin-bottom: 12px; }
        .product-card h3 { margin: 0 0 8px 0; }
        .product-meta { color: #666; font-size: 13px; margin-top: 8px; }
        .tag-badge { background: #e8f0fe; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
        #results-count { color: #666; margin-bottom: 16px; }
    </style>
</head>
<body>

    <h1>Product Search</h1>

    <!-- Search and Filter Controls -->
    <div class="filters">

        <!-- Search Box -->
        <input
            type="text"
            id="search-input"
            placeholder="Search by name or description..."
        />

        <!-- Category Dropdown -->
        <select id="category-select">
            <option value="">All Categories</option>
        </select>

        <button onclick="applyFilters()">Search</button>
        <button onclick="clearFilters()">Clear</button>

    </div>

    <!-- Tag Checkboxes -->
    <div class="tags-container" id="tags-container"></div>

    <br/>

    <!-- Results -->
    <div id="results-count"></div>
    <div id="results-container"></div>

    <script>
        // Load categories, tags, and products when page opens
        document.addEventListener('DOMContentLoaded', () => {
            loadCategories();
            loadTags();
            loadProducts();
        });

        // xsLoad Categories into Dropdown 
        async function loadCategories() {
            const response = await fetch('/api/categories/');
            const data = await response.json();

            const select = document.getElementById('category-select');
            data.forEach(category => {
                const option = document.createElement('option');
                option.value = category.id;
                option.textContent = category.name;
                select.appendChild(option);
            });
        }

        // ---- Load Tags as Checkboxes ----
        async function loadTags() {
            const response = await fetch('/api/tags/');
            const data = await response.json();

            const container = document.getElementById('tags-container');
            data.forEach(tag => {
                const label = document.createElement('label');
                label.className = 'tag-checkbox';
                label.innerHTML = `
                    <input type="checkbox" value="${tag.id}" class="tag-check"/>
                    ${tag.name}
                `;
                container.appendChild(label);
            });
        }

        // Build URL and Load Products 
        async function loadProducts(search = '', category = '', tags = []) {
            // Build the URL with query parameters
            let url = '/api/products/?';

            if (search) url += `search=${search}&`;
            if (category) url += `category=${category}&`;
            tags.forEach(tag => url += `tags=${tag}&`);

            const response = await fetch(url);
            const data = await response.json();

            displayProducts(data);
        }

        // Display Products on Page 
        function displayProducts(products) {
            const container = document.getElementById('results-container');
            const countEl = document.getElementById('results-count');

            countEl.textContent = `${products.length} product(s) found`;

            if (products.length === 0) {
                container.innerHTML = '<p>No products found.</p>';
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <h3>${product.name}</h3>
                    <p>${product.description || 'No description available'}</p>
                    <div class="product-meta">
                        <strong>Price:</strong> $${product.price} &nbsp;|&nbsp;
                        <strong>Category:</strong> ${product.category.name}
                    </div>
                    <div class="product-meta">
                        ${product.tags.map(tag => `<span class="tag-badge">${tag.name}</span>`).join(' ')}
                    </div>
                </div>
            `).join('');
        }

        // Apply Filters
        function applyFilters() {
            const search = document.getElementById('search-input').value;
            const category = document.getElementById('category-select').value;
            const tags = [...document.querySelectorAll('.tag-check:checked')]
                .map(checkbox => checkbox.value);

            loadProducts(search, category, tags);
        }

        // Clear All Filters
        function clearFilters() {
            document.getElementById('search-input').value = '';
            document.getElementById('category-select').value = '';
            document.querySelectorAll('.tag-check:checked')
                .forEach(checkbox => checkbox.checked = false);

            loadProducts();
        }
    </script>

</body>
</html>
